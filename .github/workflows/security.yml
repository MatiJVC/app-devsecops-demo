name: Security — Análisis de seguridad


on:
  push:
    branches: [ 'main', 'develop' ]
  pull_request:
    branches: [ 'main' ]
  schedule:
    - cron: '0 3 * * 1'   # Cada lunes a las 03:00 UTC
  # El análisis programado detecta vulnerabilidades en dependencias
  # que aparecen DESPUÉS de hacer el push (vulnerabilidades de día 0).


permissions:
  contents: read
  security-events: write
  # Principio de mínimo privilegio: solo los permisos necesarios.


jobs:
  codeql:
    name: SAST — CodeQL
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0    # Historial completo para mejor análisis


      - name: Inicializar CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          # Otros lenguajes: python, java, csharp, go, cpp, ruby
          queries: security-extended
          # security-extended incluye reglas de mayor severidad


      - name: Auto-build (inferir compilación)
        uses: github/codeql-action/autobuild@v3


      - name: Ejecutar análisis CodeQL
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:javascript-typescript'
      - name: Notificar falla de seguridad
        if: failure()
        # if: failure() ejecuta este step SOLO si el job falló
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": ":rotating_light: *FALLA DE SEGURIDAD en CI/CD*",
              "attachments": [{
                "color": "danger",
                "fields": [
                  {"title": "Repositorio", "value": "${{ github.repository }}"},
                  {"title": "Branch", "value": "${{ github.ref_name }}"},
                  {"title": "Commit", "value": "${{ github.sha }}"},
                  {"title": "Actor", "value": "${{ github.actor }}"}
                ]
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

          
  sca-npm:
    name: SCA — npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - name: Auditoría de dependencias
        run: npm audit --audit-level=high
      # --audit-level=high: falla solo en vulnerabilidades HIGH o CRITICAL
      # moderate: falla también en vulnerabilidades moderadas
      # Ajustar según la política de riesgo del equipo
      - name: Notificar falla de seguridad
        if: failure()
        # if: failure() ejecuta este step SOLO si el job falló
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": ":rotating_light: *FALLA DE SEGURIDAD en CI/CD*",
              "attachments": [{
                "color": "danger",
                "fields": [
                  {"title": "Repositorio", "value": "${{ github.repository }}"},
                  {"title": "Branch", "value": "${{ github.ref_name }}"},
                  {"title": "Commit", "value": "${{ github.sha }}"},
                  {"title": "Actor", "value": "${{ github.actor }}"}
                ]
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

