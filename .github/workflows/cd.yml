name: CD — Despliegue Continuo


on:
  push:
    tags:
      - 'v*.*.*'   # Activado por tag semántico (v1.2.3)
# El CD solo se activa cuando se crea un tag de versión,
# no en cada push. Esto provee un control intencional del despliegue.


env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}


permissions:
  contents: read
  packages: write
  # packages: write permite publicar en GitHub Container Registry (GHCR)


jobs:
  build-and-push:
    name: Build y publicar imagen
    runs-on: ubuntu-latest
    outputs:
      image-digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@v4


      - name: Login a GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}


      - name: Extraer metadatos (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=sha,prefix=sha-


      - name: Build y push de imagen
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}


  trivy-scan:
    name: Container Scan — Trivy
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4

      - name: Construir imagen Docker
        run: docker build -t app-demo:${{ github.sha }} .

      - name: Escanear con Trivy
        uses: aquasecurity/trivy-action@master
        # @master: rama principal de la acción (compatible con Trivy últimas versiones)
        with:
          image-ref: 'app-demo:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          # exit-code 1: el job falla si hay CRITICAL o HIGH
          ignore-unfixed: true
          # ignore-unfixed: ignora CVEs sin parche disponible

      - name: Publicar resultados en Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'


  deploy-staging:
    name: Desplegar en Staging
    runs-on: ubuntu-latest
    needs: trivy-scan
    environment: staging
    # 'environment' permite configurar reglas de protección en GitHub
    steps:
      - name: Deploy a staging
        run: |
          echo 'Desplegando versión ${{ github.ref_name }} en staging...'
          # Aquí va el comando real de despliegue:
          # kubectl apply -f k8s/staging/
          # aws ecs update-service --cluster staging ...


  deploy-production:
    name: Desplegar en Producción
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production
    # El environment 'production' puede requerir aprobación manual
    # configurada en Settings → Environments → Required reviewers
    steps:
      - name: Deploy a producción
        run: |
          echo 'Desplegando versión ${{ github.ref_name }} en producción...'
