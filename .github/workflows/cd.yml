name: CD — Despliegue Continuo


on:
  push:
    tags:
      - 'v*.*.*'   # Activado por tag semántico (v1.2.3)
# El CD solo se activa cuando se crea un tag de versión,
# no en cada push. Esto provee un control intencional del despliegue.


env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}


permissions:
  contents: read
  packages: write
  security-events: write
  # security-events: write permite subir resultados SARIF de Trivy a Code Scanning


jobs:
  build-and-push:
    name: Build y publicar imagen
    runs-on: ubuntu-latest
    outputs:
      image-digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@v4


      - name: Login a GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}


      - name: Extraer metadatos (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=sha,prefix=sha-


      - name: Build y push de imagen
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}


  trivy-scan:
    name: Container Scan — Trivy
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4

      - name: Construir imagen Docker (SECURE)
        run: docker build -t app-demo:${{ github.sha }} .

      - name: Escanear con Trivy (imagen SECURE - solo reporte JSON)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'app-demo:${{ github.sha }}'
          format: 'json'
          output: 'trivy-results.json'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          ignore-unfixed: true

      - name: Mostrar resumen de vulnerabilidades
        run: |
          echo "===== RESUMEN TRIVY ====="
          VULN_COUNT=$(grep -o '"ruleId"' trivy-results.sarif | wc -l)
          echo "Total de vulnerabilidades CRITICAL/HIGH encontradas: $VULN_COUNT"
          if [ "$VULN_COUNT" -gt 0 ]; then
            echo "✓ Dockerfile seguro detectó vulnerabilidades (puede ser esperado en librerías del SO)"
            echo "Ver detalle en: GitHub → Security → Code scanning"
          else
            echo "✓ Dockerfile seguro sin vulnerabilidades CRITICAL/HIGH"
          fi

      - name: Escanear con Trivy (imagen SECURE - formato SARIF)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'app-demo:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          ignore-unfixed: true

      - name: Mostrar vulnerabilidades en formato tabla
        run: |
          echo "===== VULNERABILIDADES ENCONTRADAS ====="
          if [ -f trivy-results.sarif ]; then
            grep -o '"ruleId":"[^"]*"' trivy-results.sarif | head -20 || echo "Sin vulnerabilidades CRITICAL/HIGH"
          fi

      - name: Verificar que SARIF existe
        run: |
          ls -la trivy-results.sarif
          echo "SARIF file size:"
          wc -c trivy-results.sarif
          echo "===== CONTENIDO DEL SARIF ====="
          head -c 2000 trivy-results.sarif
          echo ""
          echo "===== CANTIDAD DE VULNERABILIDADES ====="
          grep -o '"ruleId"' trivy-results.sarif | wc -l

      - name: Publicar resultados en Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy'


  deploy-staging:
    name: Desplegar en Staging
    runs-on: ubuntu-latest
    needs: trivy-scan
    environment: staging
    # 'environment' permite configurar reglas de protección en GitHub
    steps:
      - name: Deploy a staging
        run: |
          echo 'Desplegando versión ${{ github.ref_name }} en staging...'
          # Aquí va el comando real de despliegue:
          # kubectl apply -f k8s/staging/
          # aws ecs update-service --cluster staging ...


  deploy-production:
    name: Desplegar en Producción
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production
    # El environment 'production' puede requerir aprobación manual
    # configurada en Settings → Environments → Required reviewers
    steps:
      - name: Deploy a producción
        run: |
          echo 'Desplegando versión ${{ github.ref_name }} en producción...'
